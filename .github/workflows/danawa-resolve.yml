name: Resolve Danawa Final URLs

on:
  workflow_dispatch:

jobs:
  resolve:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble

    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Debug
        run: |
          pwd
          ls -la
          ls -la scripts
          node -v
          npm -v
          cat package.json

      - name: Install packages
        run: npm ci

      - name: Resolve final URLs
        run: npm run resolve

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: danawa-resolved
          path: data/