name: Resolve Danawa Final URLs

on:
  workflow_dispatch:

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Debug environment
        run: |
          echo "PWD=$(pwd)"
          ls -la
          echo "--- scripts ---"
          ls -la scripts
          echo "--- node ---"
          node -v
          which node
          echo "--- npm ---"
          npm -v
          which npm
          echo "--- package.json ---"
          cat package.json

      - name: Install packages
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Resolve final URLs
        run: npm run resolve

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: danawa-resolved
          path: data/